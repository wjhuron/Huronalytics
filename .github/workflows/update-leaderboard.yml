name: Update Leaderboard

on:
  # Manual trigger from GitHub Actions tab
  workflow_dispatch:

  # Auto-run daily at 8 AM ET (1 PM UTC)
  schedule:
    - cron: '0 13 * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install gspread google-auth

      - name: Fetch data and build leaderboard
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
        run: python3 process_data.py

      - name: Validate output integrity
        run: |
          python3 -c "
          import json, sys
          for f in ['data/pitch_leaderboard_rs.json', 'data/pitcher_leaderboard_rs.json', 'data/hitter_leaderboard_rs.json']:
              d = json.load(open(f))
              if len(d) < 50:
                  print(f'FAIL: {f} has only {len(d)} rows (expected 50+)')
                  sys.exit(1)
              print(f'OK: {f} has {len(d)} rows')
          # Check data_embedded.js is non-trivial
          import os
          size = os.path.getsize('data/data_embedded.js')
          if size < 100000:
              print(f'FAIL: data_embedded.js is only {size} bytes (expected 100KB+)')
              sys.exit(1)
          print(f'OK: data_embedded.js is {size:,} bytes')
          "

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ index.html css/ js/
          if git diff --cached --quiet; then
            echo "No changes to deploy."
          else
            git commit -m "Update leaderboard $(date '+%Y-%m-%d %H:%M')"
            git push origin main
          fi
