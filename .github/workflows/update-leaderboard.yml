name: Update Leaderboard

on:
  # Manual trigger only — run from the GitHub Actions tab (or the gh
  # CLI). Deliberately no schedule: Wally pushes this himself, so every
  # run reflects an intentional update rather than a clock tick.
  workflow_dispatch:

permissions:
  contents: write

# Don't let two leaderboard runs race each other onto main.
concurrency:
  group: update-leaderboard
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install 'gspread>=6.0,<7.0' 'google-auth>=2.0,<3.0' numpy pandas scikit-learn xgboost

      - name: Fetch data and build leaderboard
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
        run: python3 process_data.py

      # Stuff+ is an offline-trained model (needs xgboost), so it runs here
      # rather than inside process_data.py. It trains on the fresh pickle that
      # process_data.py just built, injects scores into the leaderboard JSONs,
      # then rebuild_embed.py swaps those into data_embedded.json.gz (which
      # process_data.py built with the previous run's preserved scores).
      - name: Fetch prior-season training data (encrypted release asset)
        # The 2025 retagged training set travels as AES-256 ciphertext on the
        # public release; only CI (STUFF_DATA_KEY secret) and Wally's .env can
        # decrypt. See scripts/build_2025_training_set.py for provenance.
        env:
          STUFF_DATA_KEY: ${{ secrets.STUFF_DATA_KEY }}
        run: |
          curl -sL -o /tmp/p25.enc \
            https://github.com/wjhuron/Huronalytics/releases/download/latest-data/_pitches2025_training.pkl.enc \
            && openssl enc -d -aes-256-cbc -pbkdf2 -pass env:STUFF_DATA_KEY \
                 -in /tmp/p25.enc -out data/_pitches2025_training.pkl \
            || echo "prior-season asset unavailable — trainer will fall back"

      - name: Compute Stuff+ (train on fresh pickle, inject into leaderboards)
        # Retrain ONLY when the prior-season (2025) training pickle is present:
        # the model is now season-blocked multi-season (see train_stuff_v11.py),
        # and retraining without 2025 would silently regress to the weaker
        # 2026-only config (and drop e.g. Tyler Rogers from 128 back to 50).
        # Until a private transport for the pickle is wired up, CI carries the
        # last injected scores forward (process_data.py preserves them).
        run: |
          if [ -f data/_pitches2025_training.pkl ]; then
            python3 stuff_plus_v11/train_stuff_v11.py --inject
          else
            echo "prior-season pickle absent — keeping preserved Stuff+ scores"
          fi

      - name: Rebuild embedded payload with injected Stuff+
        run: python3 scripts/rebuild_embed.py

      - name: Validate output integrity
        run: |
          python3 -c "
          import json, sys, os

          errors = []

          # Row count and field-level checks
          REQUIRED_FIELDS = {
              'data/pitch_leaderboard_rs.json': ['pitcher', 'team', 'pitchType', 'count'],
              'data/pitcher_leaderboard_rs.json': ['pitcher', 'team', 'era'],
              'data/hitter_leaderboard_rs.json': ['hitter', 'team', 'pa'],
          }
          for f, fields in REQUIRED_FIELDS.items():
              d = json.load(open(f))
              if len(d) < 50:
                  errors.append(f'FAIL: {f} has only {len(d)} rows (expected 50+)')
              else:
                  print(f'OK: {f} has {len(d)} rows')
              # Spot-check first row has required fields
              if d:
                  missing = [k for k in fields if k not in d[0]]
                  if missing:
                      errors.append(f'FAIL: {f} missing fields: {missing}')

          # Check the gzipped payload: non-trivial size AND actually
          # inflates to JSON with the keys the frontend reads. A truncated
          # or corrupt .gz would break the live site for every visitor, so
          # validate it for real (cheap — ~1-2s for ~17 MB).
          import gzip
          gz = 'data/data_embedded.json.gz'
          if os.path.exists('data/data_embedded.js'):
              errors.append('FAIL: legacy data/data_embedded.js still present (should be replaced by the .gz)')
          if not os.path.exists(gz):
              errors.append(f'FAIL: {gz} is missing')
          else:
              size = os.path.getsize(gz)
              if size < 1_000_000:
                  errors.append(f'FAIL: {gz} is only {size} bytes (expected >1 MB)')
              else:
                  try:
                      obj = json.loads(gzip.decompress(open(gz, 'rb').read()))
                      need = ['pitcherData', 'pitchData', 'hitterData', 'metadata', 'microData']
                      miss = [k for k in need if k not in obj]
                      npitch = len(obj.get('pitcherData', []))
                      if miss:
                          errors.append(f'FAIL: {gz} inflated but missing keys: {miss}')
                      elif npitch < 50:
                          errors.append(f'FAIL: {gz} pitcherData has only {npitch} rows')
                      else:
                          print(f'OK: {gz} is {size:,} bytes, inflates to JSON ({npitch} pitchers)')
                  except Exception as e:
                      errors.append(f'FAIL: {gz} did not decompress/parse: {e}')

          if errors:
              for e in errors:
                  print(e)
              sys.exit(1)
          "

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ index.html css/ js/
          if git diff --cached --quiet; then
            echo "No changes to deploy."
          else
            git commit -m "Update leaderboard $(date '+%Y-%m-%d %H:%M')"

            # Retry on non-fast-forward: if a concurrent push landed on main
            # while we were running, rebase the leaderboard commit on top and
            # try again. Five attempts is enough headroom for any realistic
            # race; if we still can't push after that, surface the error.
            for attempt in 1 2 3 4 5; do
              if git push origin main; then
                break
              fi
              echo "Push attempt $attempt rejected, rebasing on origin/main and retrying..."
              git pull --rebase origin main
              if [ $attempt -eq 5 ]; then
                echo "Push still failing after 5 attempts."
                exit 1
              fi
            done
          fi

      # Publish the pickle cache as a GitHub Release asset. The pickle is
      # gitignored (it's ~100 MB, too big for git) but downstream tools like
      # HitterCards.py depend on it for per-pitch data. Without this step,
      # local clones can never get a fresh pickle from CI — they'd have to
      # run process_data.py locally, which means re-fetching everything
      # from Google Sheets. Attaching to a fixed-tag release lets the
      # card auto-download the latest pickle in seconds.
      - name: Encrypt pickle for publication
        # The retagged pitch data ships as AES-256 ciphertext only
        # (STUFF_DATA_KEY decrypts: repo secret in CI, .env locally).
        if: success()
        env:
          STUFF_DATA_KEY: ${{ secrets.STUFF_DATA_KEY }}
        run: |
          openssl enc -aes-256-cbc -pbkdf2 -pass env:STUFF_DATA_KEY \
            -in data/all_pitches_rs_cache.pkl -out data/all_pitches_rs_cache.pkl.enc

      - name: Publish pickle to "latest-data" release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-data
          name: Latest pipeline pickle
          body: |
            Automated upload of the pitch-level cache from the most
            recent pipeline run. HitterCards.py downloads this file
            automatically when it detects a stale local pickle.

            Updated: ${{ github.event.repository.updated_at }}
          files: data/all_pitches_rs_cache.pkl.enc
          fail_on_unmatched_files: true
          make_latest: false
