name: Update Leaderboard

on:
  # Manual trigger from GitHub Actions tab
  workflow_dispatch:

  # Auto-run daily at 8 AM ET (1 PM UTC)
  schedule:
    - cron: '0 13 * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install 'gspread>=6.0,<7.0' 'google-auth>=2.0,<3.0'

      - name: Fetch data and build leaderboard
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
        run: python3 process_data.py

      - name: Validate output integrity
        run: |
          python3 -c "
          import json, sys, os

          errors = []

          # Row count and field-level checks
          REQUIRED_FIELDS = {
              'data/pitch_leaderboard_rs.json': ['pitcher', 'team', 'pitchType', 'count'],
              'data/pitcher_leaderboard_rs.json': ['pitcher', 'team', 'era'],
              'data/hitter_leaderboard_rs.json': ['hitter', 'team', 'pa'],
          }
          for f, fields in REQUIRED_FIELDS.items():
              d = json.load(open(f))
              if len(d) < 50:
                  errors.append(f'FAIL: {f} has only {len(d)} rows (expected 50+)')
              else:
                  print(f'OK: {f} has {len(d)} rows')
              # Spot-check first row has required fields
              if d:
                  missing = [k for k in fields if k not in d[0]]
                  if missing:
                      errors.append(f'FAIL: {f} missing fields: {missing}')

          # Check data_embedded.js is non-trivial
          size = os.path.getsize('data/data_embedded.js')
          if size < 100000:
              errors.append(f'FAIL: data_embedded.js is only {size} bytes (expected 100KB+)')
          else:
              print(f'OK: data_embedded.js is {size:,} bytes')

          if errors:
              for e in errors:
                  print(e)
              sys.exit(1)
          "

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # data/data_embedded.js is .gitignored — served from Releases instead
          git add data/ index.html css/ js/
          if git diff --cached --quiet; then
            echo "No changes to deploy."
          else
            git commit -m "Update leaderboard $(date '+%Y-%m-%d %H:%M')"
            git push origin main
          fi

      - name: Upload data bundle to rolling release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Replace the 'data-latest' release asset with the fresh bundle.
          # The release URL is stable; clients hit Releases CDN with hourly
          # cache-bust query in index.html.
          gh release delete data-latest --yes --cleanup-tag 2>/dev/null || true
          gh release create data-latest data/data_embedded.js \
            --title "Latest data bundle" \
            --notes "Auto-generated $(date -u +%Y-%m-%dT%H:%MZ)"
